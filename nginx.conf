user www-data;

worker_processes 1;
pid /var/run/nginx.pid;

events {
	multi_accept on;
  worker_connections 1024;
}

http {
	gzip on;
	gzip_vary on;
	gzip_comp_level 5;
	gzip_types    text/plain application/x-javascript text/xml text/css;

	autoindex on;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;
  client_max_body_size 32M;
	client_header_buffer_size 8m;
	large_client_header_buffers 8 8m;

	fastcgi_buffer_size 8m;
	fastcgi_buffers 8 8m;

	fastcgi_read_timeout 600;

	set_real_ip_from 204.93.240.0/24;
	set_real_ip_from 204.93.177.0/24;
	set_real_ip_from 199.27.128.0/21;
	set_real_ip_from 173.245.48.0/20;
	set_real_ip_from 103.21.244.0/22;
	set_real_ip_from 103.22.200.0/22;
	set_real_ip_from 103.31.4.0/22;
	set_real_ip_from 141.101.64.0/18;
	set_real_ip_from 108.162.192.0/18;
	set_real_ip_from 190.93.240.0/20;
	set_real_ip_from 188.114.96.0/20;
	set_real_ip_from 197.234.240.0/22;
	set_real_ip_from 198.41.128.0/17;
	real_ip_header     CF-Connecting-IP;

	# Proxy host capture log format.
	# Captures CDN forwarding headers to identify the intermediate proxy host
	# (the 'Address' field) that clients use in VLESS/CDN setups.
	#
	# Connection chain: Client -> [Proxy Host] -> CDN (Bunny/Vercel) -> Origin
	# The last IP in XFF:"..." is the proxy host IP the client connected to.
	#
	# To enable proxy capture logging, add the following to your server block:
	#   access_log /var/log/nginx/proxy-capture.log proxy_capture;
	log_format proxy_capture
		'$remote_addr [$time_local] "$request" $status '
		'XFF:"$http_x_forwarded_for" '
		'RealIP:"$http_x_real_ip" '
		'Host:"$http_host" '
		'SNI:"$ssl_server_name" '
		'ProxyHost:"$proxy_host" '
		'UpstreamAddr:"$upstream_addr" '
		'BunnyCDN:"$http_cdn_requestcountrycode" '
		'VercelFWD:"$http_x_vercel_forwarded_for" '
		'CFConnecting:"$http_cf_connecting_ip"';

  include /etc/nginx/conf.d/*.conf;
}