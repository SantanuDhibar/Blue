user www-data;

worker_processes 1;
pid /var/run/nginx.pid;

events {
	multi_accept on;
  worker_connections 1024;
}

http {
	gzip on;
	gzip_vary on;
	gzip_comp_level 5;
	gzip_types    text/plain application/x-javascript text/xml text/css;

	autoindex on;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /var/log/nginx/access.log;
  error_log /var/log/nginx/error.log;
  client_max_body_size 32M;
	client_header_buffer_size 8m;
	large_client_header_buffers 8 8m;

	fastcgi_buffer_size 8m;
	fastcgi_buffers 8 8m;

	fastcgi_read_timeout 600;

	# Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4)
	set_real_ip_from 173.245.48.0/20;
	set_real_ip_from 103.21.244.0/22;
	set_real_ip_from 103.22.200.0/22;
	set_real_ip_from 103.31.4.0/22;
	set_real_ip_from 141.101.64.0/18;
	set_real_ip_from 108.162.192.0/18;
	set_real_ip_from 190.93.240.0/20;
	set_real_ip_from 188.114.96.0/20;
	set_real_ip_from 197.234.240.0/22;
	set_real_ip_from 198.41.128.0/17;
	set_real_ip_from 162.158.0.0/15;
	set_real_ip_from 104.16.0.0/13;
	set_real_ip_from 104.24.0.0/14;
	set_real_ip_from 172.64.0.0/13;
	set_real_ip_from 131.0.72.0/22;
	# Cloudflare IPv6 ranges (https://www.cloudflare.com/ips-v6)
	set_real_ip_from 2400:cb00::/32;
	set_real_ip_from 2606:4700::/32;
	set_real_ip_from 2803:f800::/32;
	set_real_ip_from 2405:b500::/32;
	set_real_ip_from 2405:8100::/32;
	set_real_ip_from 2a06:98c0::/29;
	set_real_ip_from 2c0f:f248::/32;
	real_ip_header     CF-Connecting-IP;

	# Proxy host capture log format.
	# Captures CDN forwarding headers to identify the intermediate proxy host
	# (the 'Address' field) that clients use in VLESS/CDN setups.
	#
	# Connection chain: Client -> [Proxy Host] -> CDN (Bunny/Vercel/CF/Netlify/Render) -> Origin
	# The last IP in XFF:"..." is the proxy host IP the client connected to.
	#
	# SNI fallback: when the CDN terminates TLS, $ssl_server_name may be "-";
	# XFwdHost (X-Forwarded-Host) and Host:"..." carry the intended hostname instead.
	#
	# To enable proxy capture logging, add the following to your server block:
	#   access_log /var/log/nginx/proxy-capture.log proxy_capture;
	log_format proxy_capture
		'$remote_addr [$time_local] "$request" $status '
		'XFF:"$http_x_forwarded_for" '
		'RealIP:"$http_x_real_ip" '
		'Host:"$http_host" '
		'SNI:"$ssl_server_name" '
		'ProxyHost:"$proxy_host" '
		'UpstreamAddr:"$upstream_addr" '
		'XFwdHost:"$http_x_forwarded_host" '
		'BunnyCDN:"$http_cdn_requestcountrycode" '
		'VercelFWD:"$http_x_vercel_forwarded_for" '
		'CFConnecting:"$http_cf_connecting_ip" '
		'CFRay:"$http_cf_ray" '
		'NFClient:"$http_x_nf_client_connection_ip" '
		'RenderFWD:"$http_render_forwarding_ip"';

  include /etc/nginx/conf.d/*.conf;
}